[project]
name = "yt-transcriber"
version = "0.1.0"
description = "CLI para transcrever vídeos do YouTube e analisar com LLM local."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "ctranslate2>=4.7.2",
    "faster-whisper>=1.2.1",
    "langchain-ollama>=0.3.0",
    "langchain-text-splitters>=0.3.0",
    "tqdm>=4.67.3",
    "yt-dlp>=2026.3.17",
]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "ruff>=0.15.14",
]
