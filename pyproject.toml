[project]
name = "mill-tools"
version = "0.1.0"
description = "Multiferramenta pessoal para processamento de áudio, vídeo e transcrição."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "ctranslate2>=4.7.2",
    "faster-whisper>=1.2.1",
    "flet>=0.28",
    "langchain-google-genai>=2.1.0",
    "langchain-ollama>=0.3.0",
    "langchain-text-splitters>=0.3.0",
    "python-dotenv>=1.0.1",
    "tqdm>=4.67.3",
    "pillow>=12",
    "yt-dlp>=2026.3.17",
]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "ruff>=0.15.14",
]
